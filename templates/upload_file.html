{% extends 'base.html' %}

{% block content %}

<div class="row">

    <div class="col-md-5">

        <div class="card-box">

            <h3 class="mb-4">Upload Project File</h3>

            <form method="POST"
                  enctype="multipart/form-data">

                {% csrf_token %}

                {{form.as_p}}

                <button class="blue-btn">

                    Upload File

                </button>

            </form>

        </div>

    </div>

    <div class="col-md-7">

        <div class="card-box">

            <h3 class="mb-4">Uploaded Files</h3>

            {% for file in files %}

            <div style="border-bottom:1px solid #ddd;padding:15px 0;">

                <h5>

                    {{file.uploaded_by.username}}

                </h5>

                <a href="{{file.file.url}}"
                   class="btn btn-primary">

                    Download File

                </a>

            </div>

            {% endfor %}

        </div>

    </div>

</div>

{% endblock %}
