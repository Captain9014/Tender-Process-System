
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#b4b7bae2,#fcfcfe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px 15px;
    font-family:Arial, sans-serif;
}

.register-card{
    background:#fff;
    width:100%;
    max-width:550px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.logo{
    font-size:50px;
    text-align:center;
    margin-bottom:10px;
}

.register-title{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
}

.register-subtitle{
    text-align:center;
    color:#6c757d;
    margin-bottom:30px;
}

.form-control,
.form-select{
    padding:12px;
    border-radius:10px;
}

.form-control:focus,
.form-select:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,0.25);
}

.register-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0d6efd;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.register-btn:hover{
    background:#0b5ed7;
}

.footer-text{
    text-align:center;
    margin-top:20px;
    color:#6c757d;
}

.footer-text a{
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="register-card">

    <div class="logo">
        🏗️
    </div>

    <h2 class="register-title">
        Create Account
    </h2>

    <p class="register-subtitle">
        Register to participate in Tender Management System
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-bold">
                Full Name
            </label>

            <input type="text"
                   name="full_name"
                   class="form-control"
                   placeholder="Enter Full Name"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">
                Username
            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Choose Username"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">
                Email Address
            </label>

            <input type="email"
                   name="email"
                   class="form-control"
                   placeholder="Enter Email"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">
                User Type
            </label>

            <select name="role" class="form-select">
                <option value="client">Client</option>
                <option value="builder">Builder</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">
                Password
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Create Password"
                   required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">
                Confirm Password
            </label>

            <input type="password"
                   name="confirm_password"
                   class="form-control"
                   placeholder="Confirm Password"
                   required>
        </div>

        <button type="submit" class="register-btn">
            Create Account
        </button>

    </form>

    <div class="footer-text">
        Already have an account?
        <a href="/login/">
            Login Here
        </a>
    </div>

</div>

</body>
</html>
