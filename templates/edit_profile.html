
{% extends 'base.html' %}

{% block content %}

<div class="container-fluid px-4">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="profile-card">

                <div class="text-center mb-5">

                    <div class="profile-icon">
                        👤
                    </div>

                    <h2 class="fw-bold mt-3">
                        Edit Profile
                    </h2>

                    <p class="text-muted">
                        Update your personal information and keep your profile up to date.
                    </p>

                </div>

                <form method="POST"
                      enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="form-container">

                        {{ form.as_p }}

                    </div>

                    <div class="text-center mt-4">

                        <button type="submit"
                                class="save-btn">

                            Save Changes

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<style>

.profile-card{
    background:#ffffff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    margin-top:20px;
    margin-bottom:20px;
}

.profile-icon{
    width:90px;
    height:90px;
    background:#0d6efd;
    color:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    margin:auto;
}

.form-container p{
    margin-bottom:20px;
}

.form-container label{
    font-weight:600;
    margin-bottom:8px;
    display:block;
}

.form-container input,
.form-container textarea,
.form-container select{
    width:100%;
    padding:12px;
    border:1px solid #dcdcdc;
    border-radius:12px;
    outline:none;
    transition:0.3s;
}

.form-container input:focus,
.form-container textarea:focus,
.form-container select:focus{
    border-color:#0d6efd;
    box-shadow:0 0 10px rgba(13,110,253,0.15);
}

.form-container textarea{
    min-height:120px;
}

.save-btn{
    background:#0d6efd;
    color:white;
    border:none;
    padding:12px 40px;
    border-radius:12px;
    font-weight:600;
    transition:0.3s;
}

.save-btn:hover{
    background:#0b5ed7;
    transform:translateY(-2px);
}

@media(max-width:768px){

    .profile-card{
        padding:25px;
    }

}

</style>

{% endblock %}
