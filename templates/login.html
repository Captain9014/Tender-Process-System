
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#f6f7f9cd,#d9d7dc);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

.login-card{
    background:#fff;
    width:100%;
    max-width:450px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.logo{
    font-size:50px;
    text-align:center;
    margin-bottom:10px;
}

.login-title{
    text-align:center;
    font-weight:bold;
    margin-bottom:10px;
}

.login-subtitle{
    text-align:center;
    color:#6c757d;
    margin-bottom:30px;
}

.form-control{
    padding:12px;
    border-radius:10px;
}

.form-control:focus{
    box-shadow:0 0 10px rgba(13,110,253,0.25);
    border-color:#0d6efd;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0d6efd;
    color:white;
    font-weight:bold;
    transition:0.3s;
}

.login-btn:hover{
    background:#0b5ed7;
}

.footer-text{
    text-align:center;
    margin-top:20px;
    color:#6c757d;
}

.footer-text a{
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        🏗️
    </div>

    <h2 class="login-title">
        Welcome Back
    </h2>

    <p class="login-subtitle">
        Login to access your Tender Management Dashboard
    </p>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-bold">
                Username
            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Enter Username"
                   required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">
                Password
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="footer-text">
        Don't have an account?
        <a href="/register/">
            Register Here
        </a>
    </div>

</div>

</body>
</html>
